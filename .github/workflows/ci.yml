name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install -e . --system
          uv pip install pytest pytest-cov ruff --system

      - name: Lint
        run: ruff check src/ tests/

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/specify/embeddings
          key: fastembed-bge-small-en-v1.5

      - name: Unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: E2E tests
        run: pytest tests/e2e/ -v

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          uv pip install genbadge[coverage] --system
          genbadge coverage -i coverage.xml -o badges/coverage.svg

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git diff --cached --quiet || git commit -m "chore(ci): update coverage badge [skip ci]"
          git push
