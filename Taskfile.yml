version: '3'

tasks:
  setup:
    desc: "Cria venv e instala deps"
    cmds:
      - uv venv .venv
      - uv pip install -e .
      - uv pip install pytest pytest-cov ruff

  test:
    desc: "Testes unitários"
    cmds:
      - .venv/bin/pytest tests/unit/ -v

  test:cov:
    desc: "Testes com cobertura"
    cmds:
      - .venv/bin/pytest tests/unit/ --cov=src --cov-report=term-missing

  lint:
    cmds:
      - .venv/bin/ruff check src/ tests/

  fmt:
    cmds:
      - .venv/bin/ruff format src/ tests/

  dev:install:
    desc: "Instala em modo dev (symlink)"
    cmds:
      - bash dev/symlink.sh

  dev:uninstall:
    desc: "Remove instalação dev"
    cmds:
      - bash dev/unsymlink.sh
