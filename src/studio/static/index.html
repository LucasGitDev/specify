<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>specify studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-canvas:   #0b0f1a;
      --bg-sidebar:  #0f1520;
      --bg-surface:  #141c2b;
      --bg-raised:   #1a2438;
      --border:      #1e2d45;
      --border-hi:   #2a3f5f;
      --text-primary: #d4dce8;
      --text-secondary: #7a8fa8;
      --text-muted:  #4d6080;
      --accent:      #e8a045;
      --accent-dim:  rgba(232,160,69,0.15);

      --c-decision:   #5b9cf6;
      --c-pattern:    #4ecb71;
      --c-constraint: #e05c6a;
      --c-task:       #b98af5;

      --font-ui:   'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      display: flex;
      height: 100vh;
      font-family: var(--font-ui);
      background: var(--bg-canvas);
      color: var(--text-primary);
    }

    /* ── Canvas ── */
    #graph-container {
      flex: 1;
      position: relative;
      background-color: var(--bg-canvas);
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    #sigma-container {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: absolute;
      top: 14px;
      left: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 10;
      flex-wrap: wrap;
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border-hi);
      margin: 0 4px;
      flex-shrink: 0;
    }

    button {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 5px 11px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-ui);
      font-weight: 500;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button:hover {
      border-color: var(--border-hi);
      color: var(--text-primary);
    }

    button.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    button.active .filter-dot {
      opacity: 1;
    }

    .filter-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0.45;
      transition: opacity 0.12s;
    }

    #filter-decision  .filter-dot { background: var(--c-decision); }
    #filter-pattern   .filter-dot { background: var(--c-pattern); }
    #filter-constraint .filter-dot { background: var(--c-constraint); }
    #filter-task      .filter-dot { background: var(--c-task); }

    #filter-decision.active  { background: rgba(91,156,246,0.1); border-color: var(--c-decision); color: var(--c-decision); }
    #filter-pattern.active   { background: rgba(78,203,113,0.1); border-color: var(--c-pattern);  color: var(--c-pattern); }
    #filter-constraint.active{ background: rgba(224,92,106,0.1); border-color: var(--c-constraint);color: var(--c-constraint); }
    #filter-task.active      { background: rgba(185,138,245,0.1); border-color: var(--c-task);    color: var(--c-task); }

    #filter-decision.active  .filter-dot { opacity: 1; }
    #filter-pattern.active   .filter-dot { opacity: 1; }
    #filter-constraint.active .filter-dot { opacity: 1; }
    #filter-task.active      .filter-dot { opacity: 1; }

    /* ── Stats overlay (canvas) — removed, moved to sidebar ── */
    #stats { display: none; }

    /* ── Stats panel ── */
    #stats-panel {
      position: absolute;
      top: 50px;
      left: 14px;
      width: 300px;
      background: var(--bg-sidebar);
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      padding: 14px;
      z-index: 20;
      display: none;
      flex-direction: column;
      gap: 10px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }

    #stats-panel.visible { display: flex; }

    #stats-panel h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .stat-row span:last-child {
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .stat-section-title {
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .stat-zero { color: var(--c-constraint) !important; }

    .search-item {
      font-size: 11px;
      color: var(--text-secondary);
      padding: 4px 0;
      border-bottom: 1px solid var(--bg-raised);
      line-height: 1.4;
    }

    .search-item .query { color: var(--text-primary); font-family: var(--font-mono); word-break: break-all; }
    .search-item .meta  { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

    .gate-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid var(--bg-raised);
      color: var(--text-secondary);
    }

    .gate-row span:first-child { font-family: var(--font-mono); }
    .gate-pass { color: var(--c-pattern); font-family: var(--font-mono); }
    .gate-fail { color: var(--c-constraint); font-family: var(--font-mono); }

    a.result-link {
      color: var(--accent);
      font-size: 12px;
      font-family: var(--font-mono);
      text-decoration: none;
    }
    a.result-link:hover { text-decoration: underline; }

    /* ── Sidebar ── */
    #sidebar {
      width: 320px;
      background: var(--bg-sidebar);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: width 0.18s;
    }

    #sidebar.hidden { width: 0; overflow: hidden; }

    /* Wordmark */
    #sidebar-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #wordmark {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 10px;
    }

    #wordmark span {
      color: var(--text-muted);
      font-weight: 400;
    }

    /* type stripe */
    #type-stripe {
      display: flex;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
    }

    #type-stripe div { flex: 1; }
    #type-stripe .s-decision   { background: var(--c-decision); }
    #type-stripe .s-pattern    { background: var(--c-pattern); }
    #type-stripe .s-constraint { background: var(--c-constraint); }
    #type-stripe .s-task       { background: var(--c-task); }

    /* Sidebar content */
    #sidebar-content {
      flex: 1;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    /* Sidebar footer */
    #sidebar-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #sidebar h2 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .field-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.03em;
    }

    .badge-decision   { background: rgba(91,156,246,0.12);  color: var(--c-decision); }
    .badge-pattern    { background: rgba(78,203,113,0.12);  color: var(--c-pattern); }
    .badge-constraint { background: rgba(224,92,106,0.12);  color: var(--c-constraint); }
    .badge-task       { background: rgba(185,138,245,0.12); color: var(--c-task); }

    .badge-status-planned     { background: var(--bg-raised); color: var(--text-muted); }
    .badge-status-in_progress { background: rgba(91,156,246,0.12); color: var(--c-decision); }
    .badge-status-review      { background: rgba(232,160,69,0.15); color: var(--accent); }
    .badge-status-closed      { background: rgba(78,203,113,0.12); color: var(--c-pattern); }

    textarea {
      width: 100%;
      min-height: 110px;
      background: var(--bg-canvas);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-primary);
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 8px;
      resize: vertical;
      line-height: 1.55;
    }

    textarea:focus { outline: none; border-color: var(--accent); }

    .btn-save {
      background: rgba(78,203,113,0.12);
      border-color: var(--c-pattern);
      color: var(--c-pattern);
    }
    .btn-save:hover { background: rgba(78,203,113,0.2); }

    .btn-delete {
      background: transparent;
      border-color: var(--c-constraint);
      color: var(--c-constraint);
    }
    .btn-delete:hover { background: rgba(224,92,106,0.1); }

    .meta-row {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      word-break: break-all;
    }

    #empty-state {
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      margin-top: 48px;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

<div id="graph-container">
  <div id="toolbar">
    <button onclick="reloadGraph()">Reload</button>
    <button onclick="toggleSidebar()">Panel</button>
    <button onclick="toggleStats()">Stats</button>
    <button onclick="resetLayout()">Reset</button>

    <div class="toolbar-sep"></div>

    <button id="filter-decision"   class="active" onclick="toggleFilter('decision')">
      <span class="filter-dot"></span>decision
    </button>
    <button id="filter-pattern"    class="active" onclick="toggleFilter('pattern')">
      <span class="filter-dot"></span>pattern
    </button>
    <button id="filter-constraint" class="active" onclick="toggleFilter('constraint')">
      <span class="filter-dot"></span>constraint
    </button>
    <button id="filter-task"       class="active" onclick="toggleFilter('task')">
      <span class="filter-dot"></span>task
    </button>
  </div>

  <div id="stats-panel">
    <h3>Usage stats</h3>
    <div id="stats-content"></div>
  </div>

  <div id="stats"></div>
  <div id="sigma-container"></div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="wordmark">specify <span>/ studio</span></div>
    <div id="type-stripe">
      <div class="s-decision"></div>
      <div class="s-pattern"></div>
      <div class="s-constraint"></div>
      <div class="s-task"></div>
    </div>
  </div>

  <div id="sidebar-content">
    <div id="empty-state">click a node to inspect</div>

    <!-- Memory detail -->
    <div id="memory-detail" style="display:none; gap:14px; flex-direction:column;">
      <div>
        <div class="field-label">Type</div>
        <span id="mem-badge" class="badge"></span>
      </div>
      <div>
        <div class="field-label">Scope</div>
        <span id="mem-scope" class="meta-row"></span>
      </div>
      <div id="mem-source-row" style="display:none">
        <div class="field-label">Source</div>
        <span id="mem-source" class="meta-row"></span>
      </div>
      <div>
        <div class="field-label">Content</div>
        <textarea id="mem-content"></textarea>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn-save" onclick="saveMemory()">Save</button>
        <button class="btn-delete" onclick="deleteMemory()">Delete</button>
      </div>
      <div>
        <div class="field-label">Updated</div>
        <span id="mem-updated" class="meta-row"></span>
      </div>
    </div>

    <!-- Task detail -->
    <div id="task-detail" style="display:none; gap:14px; flex-direction:column;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="badge badge-task">task</span>
        <span id="task-status-badge" class="badge"></span>
      </div>
      <div>
        <div class="field-label">Title</div>
        <span id="task-title" class="meta-row" style="color:var(--text-primary); font-family:var(--font-ui); font-size:13px;"></span>
      </div>
      <div>
        <div class="field-label">Slug</div>
        <span id="task-slug" class="meta-row"></span>
      </div>
      <div id="task-spec-row" style="display:none">
        <div class="field-label">Spec</div>
        <span id="task-spec" class="meta-row"></span>
      </div>
      <div id="task-gates-section" style="display:none">
        <div class="field-label">Gates</div>
        <div id="task-gates"></div>
      </div>
      <div id="task-result-row" style="display:none">
        <div class="field-label">Result</div>
        <a id="task-result-link" class="result-link" href="#"></a>
      </div>
      <div>
        <div class="field-label">Created</div>
        <span id="task-created" class="meta-row"></span>
      </div>
    </div>
  </div>

  <div id="sidebar-footer">
    <span id="graph-stats">— nodes · — edges</span>
  </div>
</div>

<script>
const TYPE_COLORS = {
  decision:   '#5b9cf6',
  pattern:    '#4ecb71',
  constraint: '#e05c6a',
  task:       '#b98af5',
};

const EDGE_COLORS = {
  semantic: 'rgba(122,143,168,0.2)',
  scope:    'rgba(185,138,245,0.3)',
};

const NODE_SIZES = {
  decision: 10,
  pattern: 10,
  constraint: 10,
  task: 16,
};

let sigmaInstance = null;
let graphInstance = null;
let rawData = null;
let selectedNodeId = null;
const activeFilters = new Set(['decision', 'pattern', 'constraint', 'task']);

async function loadGraph() {
  const res = await fetch('/api/graph');
  return res.json();
}

function buildSigmaGraph(data) {
  const g = new graphology.Graph({ multi: false, type: 'undirected' });

  data.nodes.forEach(n => {
    if (!activeFilters.has(n.type)) return;
    const color = TYPE_COLORS[n.type] || '#7a8fa8';
    const size = NODE_SIZES[n.type] || 10;
    const rawLabel = n.label || n.id;
    const shortLabel = rawLabel.length > 40 ? rawLabel.slice(0, 40) + '…' : rawLabel;
    g.addNode(n.id, {
      label: shortLabel,
      fullLabel: rawLabel,
      memType: n.type,
      scope: n.scope || null,
      source: n.source || null,
      status: n.status || null,
      color,
      size,
      x: Math.random() * 100,
      y: Math.random() * 100,
    });
  });

  data.edges.forEach(e => {
    if (!g.hasNode(e.source) || !g.hasNode(e.target)) return;
    if (g.hasEdge(e.source, e.target)) return;
    const kind = e.kind || 'semantic';
    g.addEdge(e.source, e.target, {
      weight: e.weight || 1,
      kind,
      color: EDGE_COLORS[kind] || EDGE_COLORS.semantic,
      size: kind === 'scope' ? 1.5 : Math.max(0.5, (e.weight || 0.5) * 2),
    });
  });

  return g;
}

function applyLayout(g) {
  if (g.order === 0) return;
  const nodes = g.nodes();
  const N = nodes.length;
  const pos = {};
  nodes.forEach((id, i) => {
    const a = (2 * Math.PI * i) / N;
    pos[id] = { x: Math.cos(a) * 50, y: Math.sin(a) * 50 };
  });
  for (let iter = 0; iter < 120; iter++) {
    const disp = {};
    nodes.forEach(id => { disp[id] = { x: 0, y: 0 }; });
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = pos[a].x - pos[b].x;
        const dy = pos[a].y - pos[b].y;
        const d2 = dx * dx + dy * dy + 0.01;
        const f = 400 / d2;
        disp[a].x += dx * f; disp[a].y += dy * f;
        disp[b].x -= dx * f; disp[b].y -= dy * f;
      }
    }
    g.edges().forEach(e => {
      const s = g.source(e), t = g.target(e);
      const dx = pos[s].x - pos[t].x;
      const dy = pos[s].y - pos[t].y;
      const d = Math.sqrt(dx * dx + dy * dy) + 0.01;
      const kind = g.getEdgeAttribute(e, 'kind');
      const f = kind === 'scope' ? d / 3 : d / 10;
      disp[s].x -= dx * f; disp[s].y -= dy * f;
      disp[t].x += dx * f; disp[t].y += dy * f;
    });
    nodes.forEach(id => {
      disp[id].x -= pos[id].x * 0.02;
      disp[id].y -= pos[id].y * 0.02;
    });
    const temp = Math.max(0.5, 5 * (1 - iter / 120));
    nodes.forEach(id => {
      const dd = Math.sqrt(disp[id].x ** 2 + disp[id].y ** 2) + 0.01;
      pos[id].x += (disp[id].x / dd) * Math.min(dd, temp);
      pos[id].y += (disp[id].y / dd) * Math.min(dd, temp);
    });
  }
  nodes.forEach(id => {
    g.setNodeAttribute(id, 'x', pos[id].x);
    g.setNodeAttribute(id, 'y', pos[id].y);
  });
}

async function initGraph() {
  const sigmaContainer = document.getElementById('sigma-container');
  rawData = await loadGraph();

  graphInstance = buildSigmaGraph(rawData);
  applyLayout(graphInstance);

  if (sigmaInstance) sigmaInstance.kill();

  sigmaInstance = new Sigma(graphInstance, sigmaContainer, {
    defaultNodeColor: '#7a8fa8',
    defaultEdgeColor: 'rgba(122,143,168,0.15)',
    renderEdgeLabels: false,
    labelFont: 'JetBrains Mono',
    labelSize: 11,
    labelColor: { color: '#7a8fa8' },
    nodeReducer: (node, data) => ({
      ...data,
      highlighted: node === selectedNodeId,
      borderColor: node === selectedNodeId ? '#e8a045' : undefined,
      size: node === selectedNodeId ? data.size + 4 : data.size,
    }),
  });

  sigmaInstance.on('clickNode', ({ node }) => {
    selectedNodeId = node;
    const attrs = graphInstance.getNodeAttributes(node);
    openDetail(node, attrs);
    sigmaInstance.refresh();
  });

  sigmaInstance.on('clickStage', () => {
    selectedNodeId = null;
    closeDetail();
    sigmaInstance.refresh();
  });

  updateStats(rawData);
}

function updateStats(data) {
  document.getElementById('graph-stats').textContent =
    `${data.nodes.length} nodes · ${data.edges.length} edges`;
}

async function openDetail(nodeId, attrs) {
  if (attrs.memType === 'task') {
    const slug = nodeId.replace(/^t:/, '');
    const res = await fetch(`/api/tasks/${slug}`);
    if (!res.ok) return;
    const t = await res.json();
    renderTaskDetail(t);
  } else {
    const res = await fetch(`/api/memories/${nodeId}`);
    if (!res.ok) return;
    const m = await res.json();
    renderMemoryDetail(nodeId, m);
  }
}

function renderMemoryDetail(nodeId, m) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('task-detail').style.display = 'none';
  const detail = document.getElementById('memory-detail');
  detail.style.display = 'flex';

  const badge = document.getElementById('mem-badge');
  badge.textContent = m.type;
  badge.className = `badge badge-${m.type}`;

  document.getElementById('mem-scope').textContent = m.scope;
  document.getElementById('mem-content').value = m.content;
  document.getElementById('mem-updated').textContent = m.updated_at;

  const srcRow = document.getElementById('mem-source-row');
  if (m.source) {
    srcRow.style.display = 'block';
    document.getElementById('mem-source').textContent = m.source;
  } else {
    srcRow.style.display = 'none';
  }

  detail.dataset.nodeId = nodeId;
}

function renderTaskDetail(t) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('memory-detail').style.display = 'none';
  const detail = document.getElementById('task-detail');
  detail.style.display = 'flex';

  const statusBadge = document.getElementById('task-status-badge');
  statusBadge.textContent = t.status;
  statusBadge.className = `badge badge-status-${t.status}`;

  document.getElementById('task-title').textContent = t.title;
  document.getElementById('task-slug').textContent = t.slug;
  document.getElementById('task-created').textContent = t.created_at;

  const specRow = document.getElementById('task-spec-row');
  if (t.spec_path) {
    specRow.style.display = 'block';
    document.getElementById('task-spec').textContent = t.spec_path;
  } else {
    specRow.style.display = 'none';
  }

  const gatesSection = document.getElementById('task-gates-section');
  if (t.gates && t.gates.length) {
    gatesSection.style.display = 'block';
    document.getElementById('task-gates').innerHTML = t.gates.map(g => {
      const cls = g.result === 'pass' ? 'gate-pass' : 'gate-fail';
      return `<div class="gate-row"><span>${g.phase}</span><span class="${cls}">${g.result}</span></div>`;
    }).join('');
  } else {
    gatesSection.style.display = 'none';
  }

  const resultRow = document.getElementById('task-result-row');
  if (t.result_path) {
    resultRow.style.display = 'block';
    const link = document.getElementById('task-result-link');
    link.textContent = t.result_path;
    link.href = `#`;
  } else {
    resultRow.style.display = 'none';
  }
}

function closeDetail() {
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('memory-detail').style.display = 'none';
  document.getElementById('task-detail').style.display = 'none';
}

async function saveMemory() {
  const detail = document.getElementById('memory-detail');
  const nodeId = detail.dataset.nodeId;
  const content = document.getElementById('mem-content').value.trim();
  if (!content) return;

  const res = await fetch(`/api/memories/${nodeId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content }),
  });

  if (res.ok) {
    graphInstance.setNodeAttribute(nodeId, 'fullLabel', content);
    const shortLabel = content.length > 40 ? content.slice(0, 40) + '…' : content;
    graphInstance.setNodeAttribute(nodeId, 'label', shortLabel);
    sigmaInstance.refresh();
  }
}

async function deleteMemory() {
  const detail = document.getElementById('memory-detail');
  const nodeId = detail.dataset.nodeId;
  if (!confirm('Delete this memory?')) return;

  const res = await fetch(`/api/memories/${nodeId}`, { method: 'DELETE' });
  if (res.ok) {
    graphInstance.dropNode(nodeId);
    sigmaInstance.refresh();
    closeDetail();
    selectedNodeId = null;
  }
}

function toggleFilter(type) {
  const btn = document.getElementById(`filter-${type}`);
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    btn.classList.remove('active');
  } else {
    activeFilters.add(type);
    btn.classList.add('active');
  }
  rebuildGraph();
}

async function rebuildGraph() {
  if (!rawData) return;
  const sigmaContainer = document.getElementById('sigma-container');
  graphInstance = buildSigmaGraph(rawData);
  applyLayout(graphInstance);
  if (sigmaInstance) sigmaInstance.kill();
  sigmaInstance = new Sigma(graphInstance, sigmaContainer, {
    defaultNodeColor: '#7a8fa8',
    defaultEdgeColor: 'rgba(122,143,168,0.15)',
    renderEdgeLabels: false,
    labelFont: 'JetBrains Mono',
    labelSize: 11,
    labelColor: { color: '#7a8fa8' },
    nodeReducer: (node, data) => ({
      ...data,
      highlighted: node === selectedNodeId,
      borderColor: node === selectedNodeId ? '#e8a045' : undefined,
      size: node === selectedNodeId ? data.size + 4 : data.size,
    }),
  });
  sigmaInstance.on('clickNode', ({ node }) => {
    selectedNodeId = node;
    openDetail(node, graphInstance.getNodeAttributes(node));
    sigmaInstance.refresh();
  });
  sigmaInstance.on('clickStage', () => {
    selectedNodeId = null;
    closeDetail();
    sigmaInstance.refresh();
  });
  closeDetail();
  selectedNodeId = null;
}

async function reloadGraph() {
  rawData = null;
  await initGraph();
}

function resetLayout() {
  if (!graphInstance) return;
  graphInstance.nodes().forEach(n => {
    graphInstance.setNodeAttribute(n, 'x', Math.random() * 100);
    graphInstance.setNodeAttribute(n, 'y', Math.random() * 100);
  });
  applyLayout(graphInstance);
  sigmaInstance.refresh();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

async function toggleStats() {
  const panel = document.getElementById('stats-panel');
  if (panel.classList.contains('visible')) {
    panel.classList.remove('visible');
    return;
  }
  const res = await fetch('/api/stats');
  const d = await res.json();
  renderStats(d);
  panel.classList.add('visible');
}

function renderStats(d) {
  const el = document.getElementById('stats-content');
  const zeroClass = d.zero_result_searches > 0 ? ' stat-zero' : '';
  let html = `
    <div class="stat-row"><span>Memories saved</span><span>${d.total_memories}</span></div>
    <div class="stat-row"><span>Total searches</span><span>${d.total_searches}</span></div>
    <div class="stat-row"><span>Zero-result searches</span><span class="${zeroClass}">${d.zero_result_searches}</span></div>
  `;

  if (d.by_source && d.by_source.length) {
    html += `<div class="stat-section-title">By source</div>`;
    d.by_source.forEach(r => {
      html += `<div class="stat-row"><span>${r.source || '(no source)'}</span><span>${r.count}</span></div>`;
    });
  }

  if (d.top_queries && d.top_queries.length) {
    html += `<div class="stat-section-title">Top queries</div>`;
    d.top_queries.forEach(r => {
      html += `<div class="stat-row"><span>${escapeHtml(r.query)}</span><span>${r.count}x</span></div>`;
    });
  }

  if (d.recent && d.recent.length) {
    html += `<div class="stat-section-title">Recent searches</div>`;
    d.recent.forEach(r => {
      const src = r.source ? ` · ${r.source}` : '';
      const dt = r.searched_at ? r.searched_at.slice(0, 16) : '';
      html += `<div class="search-item">
        <div class="query">${escapeHtml(r.query)}</div>
        <div class="meta">${dt}${src} · ${r.results_count} result(s)</div>
      </div>`;
    });
  }

  el.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

initGraph();
</script>
</body>
</html>
