<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>specify studio</title>
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }

    #graph-container {
      flex: 1;
      position: relative;
    }

    #toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 10;
      flex-wrap: wrap;
    }

    .legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
      background: rgba(13,17,23,0.85);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8b949e;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-diamond {
      width: 10px;
      height: 10px;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    button:hover { background: #30363d; }

    button.active {
      background: #388bfd22;
      border-color: #388bfd;
      color: #79c0ff;
    }

    #sidebar {
      width: 340px;
      background: #161b22;
      border-left: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
      transition: width 0.2s;
    }

    #sidebar.hidden { width: 0; padding: 0; overflow: hidden; }

    #sidebar h2 {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-label {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-decision   { background: #1f3a5f; color: #79c0ff; }
    .badge-pattern    { background: #1a3a2a; color: #56d364; }
    .badge-constraint { background: #3d1e1e; color: #f97583; }
    .badge-task       { background: #2d1b69; color: #d2a8ff; }

    .badge-status-planned    { background: #21262d; color: #8b949e; }
    .badge-status-in_progress{ background: #1f3a5f; color: #79c0ff; }
    .badge-status-review     { background: #3d2c00; color: #e3b341; }
    .badge-status-closed     { background: #1a3a2a; color: #56d364; }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      font-family: inherit;
      padding: 8px;
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus { outline: none; border-color: #58a6ff; }

    .btn-save {
      background: #238636;
      border-color: #2ea043;
      color: #fff;
    }
    .btn-save:hover { background: #2ea043; }

    .btn-delete {
      background: transparent;
      border-color: #f85149;
      color: #f85149;
    }
    .btn-delete:hover { background: #3d1e1e; }

    .meta-row {
      font-size: 12px;
      color: #8b949e;
    }

    #empty-state {
      color: #8b949e;
      font-size: 13px;
      text-align: center;
      margin-top: 40px;
    }

    #stats {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #8b949e;
      z-index: 10;
    }

    #stats-panel {
      position: absolute;
      top: 48px;
      left: 12px;
      width: 320px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      z-index: 20;
      display: none;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }

    #stats-panel.visible { display: flex; }

    #stats-panel h3 {
      font-size: 12px;
      font-weight: 600;
      color: #e6edf3;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #30363d;
      padding-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #8b949e;
    }

    .stat-row span:last-child {
      color: #c9d1d9;
      font-weight: 600;
    }

    .stat-section-title {
      font-size: 11px;
      color: #58a6ff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    .stat-zero { color: #f97583 !important; }

    .search-item {
      font-size: 11px;
      color: #8b949e;
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
      line-height: 1.4;
    }

    .search-item .query { color: #c9d1d9; word-break: break-all; }
    .search-item .meta { font-size: 10px; color: #6e7681; }

    .gate-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid #21262d;
      color: #8b949e;
    }

    .gate-pass { color: #56d364; }
    .gate-fail { color: #f97583; }

    a.result-link {
      color: #58a6ff;
      font-size: 12px;
      text-decoration: none;
    }
    a.result-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div id="graph-container">
  <div id="toolbar">
    <button onclick="reloadGraph()">Reload</button>
    <button onclick="toggleSidebar()">Panel</button>
    <button onclick="toggleStats()">Stats</button>
    <button onclick="resetLayout()">Reset layout</button>
    <button id="filter-decision"  class="active" onclick="toggleFilter('decision')">decision</button>
    <button id="filter-pattern"   class="active" onclick="toggleFilter('pattern')">pattern</button>
    <button id="filter-constraint"class="active" onclick="toggleFilter('constraint')">constraint</button>
    <button id="filter-task"      class="active" onclick="toggleFilter('task')">task</button>
  </div>

  <div id="stats-panel">
    <h3>Usage stats</h3>
    <div id="stats-content"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#79c0ff"></span>decision</div>
    <div class="legend-item"><span class="legend-dot" style="background:#56d364"></span>pattern</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f97583"></span>constraint</div>
    <div class="legend-item"><span class="legend-diamond" style="background:#d2a8ff"></span>task</div>
  </div>

  <div id="stats"></div>
</div>

<div id="sidebar">
  <div id="empty-state">Click a node to inspect</div>

  <!-- Memory detail -->
  <div id="memory-detail" style="display:none; gap:16px; flex-direction:column;">
    <div>
      <div class="field-label">Type</div>
      <span id="mem-badge" class="badge"></span>
    </div>
    <div>
      <div class="field-label">Scope</div>
      <span id="mem-scope" class="meta-row"></span>
    </div>
    <div id="mem-source-row" style="display:none">
      <div class="field-label">Source</div>
      <span id="mem-source" class="meta-row"></span>
    </div>
    <div>
      <div class="field-label">Content</div>
      <textarea id="mem-content"></textarea>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn-save" onclick="saveMemory()">Save</button>
      <button class="btn-delete" onclick="deleteMemory()">Delete</button>
    </div>
    <div>
      <div class="field-label">Updated</div>
      <span id="mem-updated" class="meta-row"></span>
    </div>
  </div>

  <!-- Task detail -->
  <div id="task-detail" style="display:none; gap:16px; flex-direction:column;">
    <div style="display:flex; align-items:center; gap:8px;">
      <span class="badge badge-task">task</span>
      <span id="task-status-badge" class="badge"></span>
    </div>
    <div>
      <div class="field-label">Title</div>
      <span id="task-title" class="meta-row" style="color:#e6edf3; font-size:14px;"></span>
    </div>
    <div>
      <div class="field-label">Slug</div>
      <span id="task-slug" class="meta-row"></span>
    </div>
    <div id="task-spec-row" style="display:none">
      <div class="field-label">Spec</div>
      <span id="task-spec" class="meta-row"></span>
    </div>
    <div id="task-gates-section" style="display:none">
      <div class="field-label">Gates</div>
      <div id="task-gates"></div>
    </div>
    <div id="task-result-row" style="display:none">
      <div class="field-label">Result</div>
      <a id="task-result-link" class="result-link" href="#"></a>
    </div>
    <div>
      <div class="field-label">Created</div>
      <span id="task-created" class="meta-row"></span>
    </div>
  </div>
</div>

<script>
const TYPE_COLORS = {
  decision:   '#79c0ff',
  pattern:    '#56d364',
  constraint: '#f97583',
  task:       '#d2a8ff',
};

const EDGE_COLORS = {
  semantic: 'rgba(139,148,158,0.25)',
  scope:    'rgba(210,168,255,0.35)',
};

const NODE_SIZES = {
  decision: 10,
  pattern: 10,
  constraint: 10,
  task: 16,
};

let sigmaInstance = null;
let graphInstance = null;
let rawData = null;
let selectedNodeId = null;
const activeFilters = new Set(['decision', 'pattern', 'constraint', 'task']);

async function loadGraph() {
  const res = await fetch('/api/graph');
  return res.json();
}

function buildSigmaGraph(data) {
  const g = new graphology.Graph({ multi: false, type: 'undirected' });

  data.nodes.forEach(n => {
    if (!activeFilters.has(n.type)) return;
    const color = TYPE_COLORS[n.type] || '#8b949e';
    const size = NODE_SIZES[n.type] || 10;
    const rawLabel = n.label || n.id;
    const shortLabel = rawLabel.length > 40 ? rawLabel.slice(0, 40) + '…' : rawLabel;
    g.addNode(n.id, {
      label: shortLabel,
      fullLabel: rawLabel,
      memType: n.type,
      scope: n.scope || null,
      source: n.source || null,
      status: n.status || null,
      color,
      size,
      x: Math.random() * 100,
      y: Math.random() * 100,
    });
  });

  data.edges.forEach(e => {
    if (!g.hasNode(e.source) || !g.hasNode(e.target)) return;
    if (g.hasEdge(e.source, e.target)) return;
    const kind = e.kind || 'semantic';
    g.addEdge(e.source, e.target, {
      weight: e.weight || 1,
      kind,
      color: EDGE_COLORS[kind] || EDGE_COLORS.semantic,
      size: kind === 'scope' ? 1.5 : Math.max(0.5, (e.weight || 0.5) * 2),
    });
  });

  return g;
}

function applyLayout(g) {
  if (g.order === 0) return;
  const nodes = g.nodes();
  const N = nodes.length;
  const pos = {};
  nodes.forEach((id, i) => {
    const a = (2 * Math.PI * i) / N;
    pos[id] = { x: Math.cos(a) * 50, y: Math.sin(a) * 50 };
  });
  for (let iter = 0; iter < 120; iter++) {
    const disp = {};
    nodes.forEach(id => { disp[id] = { x: 0, y: 0 }; });
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = pos[a].x - pos[b].x;
        const dy = pos[a].y - pos[b].y;
        const d2 = dx * dx + dy * dy + 0.01;
        const f = 400 / d2;
        disp[a].x += dx * f; disp[a].y += dy * f;
        disp[b].x -= dx * f; disp[b].y -= dy * f;
      }
    }
    g.edges().forEach(e => {
      const s = g.source(e), t = g.target(e);
      const dx = pos[s].x - pos[t].x;
      const dy = pos[s].y - pos[t].y;
      const d = Math.sqrt(dx * dx + dy * dy) + 0.01;
      const f = d / 10;
      disp[s].x -= dx * f; disp[s].y -= dy * f;
      disp[t].x += dx * f; disp[t].y += dy * f;
    });
    nodes.forEach(id => {
      disp[id].x -= pos[id].x * 0.02;
      disp[id].y -= pos[id].y * 0.02;
    });
    const temp = Math.max(0.5, 5 * (1 - iter / 120));
    nodes.forEach(id => {
      const dd = Math.sqrt(disp[id].x ** 2 + disp[id].y ** 2) + 0.01;
      pos[id].x += (disp[id].x / dd) * Math.min(dd, temp);
      pos[id].y += (disp[id].y / dd) * Math.min(dd, temp);
    });
  }
  nodes.forEach(id => {
    g.setNodeAttribute(id, 'x', pos[id].x);
    g.setNodeAttribute(id, 'y', pos[id].y);
  });
}

async function initGraph() {
  const container = document.getElementById('graph-container');
  rawData = await loadGraph();

  graphInstance = buildSigmaGraph(rawData);
  applyLayout(graphInstance);

  if (sigmaInstance) sigmaInstance.kill();

  sigmaInstance = new Sigma(graphInstance, container, {
    defaultNodeColor: '#8b949e',
    defaultEdgeColor: 'rgba(139,148,158,0.2)',
    renderEdgeLabels: false,
    labelFont: 'sans-serif',
    labelSize: 11,
    labelColor: { color: '#c9d1d9' },
    nodeReducer: (node, data) => ({
      ...data,
      highlighted: node === selectedNodeId,
      borderColor: node === selectedNodeId ? '#f0f6fc' : undefined,
      size: node === selectedNodeId ? data.size + 4 : data.size,
    }),
  });

  sigmaInstance.on('clickNode', ({ node }) => {
    selectedNodeId = node;
    const attrs = graphInstance.getNodeAttributes(node);
    openDetail(node, attrs);
    sigmaInstance.refresh();
  });

  sigmaInstance.on('clickStage', () => {
    selectedNodeId = null;
    closeDetail();
    sigmaInstance.refresh();
  });

  updateStats(rawData);
}

function updateStats(data) {
  document.getElementById('stats').textContent =
    `${data.nodes.length} nodes · ${data.edges.length} edges`;
}

async function openDetail(nodeId, attrs) {
  if (attrs.memType === 'task') {
    const slug = nodeId.replace(/^t:/, '');
    const res = await fetch(`/api/tasks/${slug}`);
    if (!res.ok) return;
    const t = await res.json();
    renderTaskDetail(t);
  } else {
    const res = await fetch(`/api/memories/${nodeId}`);
    if (!res.ok) return;
    const m = await res.json();
    renderMemoryDetail(nodeId, m);
  }
}

function renderMemoryDetail(nodeId, m) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('task-detail').style.display = 'none';
  const detail = document.getElementById('memory-detail');
  detail.style.display = 'flex';

  const badge = document.getElementById('mem-badge');
  badge.textContent = m.type;
  badge.className = `badge badge-${m.type}`;

  document.getElementById('mem-scope').textContent = m.scope;
  document.getElementById('mem-content').value = m.content;
  document.getElementById('mem-updated').textContent = m.updated_at;

  const srcRow = document.getElementById('mem-source-row');
  if (m.source) {
    srcRow.style.display = 'block';
    document.getElementById('mem-source').textContent = m.source;
  } else {
    srcRow.style.display = 'none';
  }

  detail.dataset.nodeId = nodeId;
}

function renderTaskDetail(t) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('memory-detail').style.display = 'none';
  const detail = document.getElementById('task-detail');
  detail.style.display = 'flex';

  const statusBadge = document.getElementById('task-status-badge');
  statusBadge.textContent = t.status;
  statusBadge.className = `badge badge-status-${t.status}`;

  document.getElementById('task-title').textContent = t.title;
  document.getElementById('task-slug').textContent = t.slug;
  document.getElementById('task-created').textContent = t.created_at;

  const specRow = document.getElementById('task-spec-row');
  if (t.spec_path) {
    specRow.style.display = 'block';
    document.getElementById('task-spec').textContent = t.spec_path;
  } else {
    specRow.style.display = 'none';
  }

  const gatesSection = document.getElementById('task-gates-section');
  if (t.gates && t.gates.length) {
    gatesSection.style.display = 'block';
    document.getElementById('task-gates').innerHTML = t.gates.map(g => {
      const cls = g.result === 'pass' ? 'gate-pass' : 'gate-fail';
      return `<div class="gate-row"><span>${g.phase}</span><span class="${cls}">${g.result}</span></div>`;
    }).join('');
  } else {
    gatesSection.style.display = 'none';
  }

  const resultRow = document.getElementById('task-result-row');
  if (t.result_path) {
    resultRow.style.display = 'block';
    const link = document.getElementById('task-result-link');
    link.textContent = t.result_path;
    link.href = `#`;
  } else {
    resultRow.style.display = 'none';
  }
}

function closeDetail() {
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('memory-detail').style.display = 'none';
  document.getElementById('task-detail').style.display = 'none';
}

async function saveMemory() {
  const detail = document.getElementById('memory-detail');
  const nodeId = detail.dataset.nodeId;
  const content = document.getElementById('mem-content').value.trim();
  if (!content) return;

  const res = await fetch(`/api/memories/${nodeId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content }),
  });

  if (res.ok) {
    graphInstance.setNodeAttribute(nodeId, 'fullLabel', content);
    const shortLabel = content.length > 40 ? content.slice(0, 40) + '…' : content;
    graphInstance.setNodeAttribute(nodeId, 'label', shortLabel);
    sigmaInstance.refresh();
  }
}

async function deleteMemory() {
  const detail = document.getElementById('memory-detail');
  const nodeId = detail.dataset.nodeId;
  if (!confirm('Delete this memory?')) return;

  const res = await fetch(`/api/memories/${nodeId}`, { method: 'DELETE' });
  if (res.ok) {
    graphInstance.dropNode(nodeId);
    sigmaInstance.refresh();
    closeDetail();
    selectedNodeId = null;
  }
}

function toggleFilter(type) {
  const btn = document.getElementById(`filter-${type}`);
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    btn.classList.remove('active');
  } else {
    activeFilters.add(type);
    btn.classList.add('active');
  }
  rebuildGraph();
}

async function rebuildGraph() {
  if (!rawData) return;
  const container = document.getElementById('graph-container');
  graphInstance = buildSigmaGraph(rawData);
  applyLayout(graphInstance);
  if (sigmaInstance) sigmaInstance.kill();
  sigmaInstance = new Sigma(graphInstance, container, {
    defaultNodeColor: '#8b949e',
    defaultEdgeColor: 'rgba(139,148,158,0.2)',
    renderEdgeLabels: false,
    labelFont: 'sans-serif',
    labelSize: 11,
    labelColor: { color: '#c9d1d9' },
    nodeReducer: (node, data) => ({
      ...data,
      highlighted: node === selectedNodeId,
      borderColor: node === selectedNodeId ? '#f0f6fc' : undefined,
      size: node === selectedNodeId ? data.size + 4 : data.size,
    }),
  });
  sigmaInstance.on('clickNode', ({ node }) => {
    selectedNodeId = node;
    openDetail(node, graphInstance.getNodeAttributes(node));
    sigmaInstance.refresh();
  });
  sigmaInstance.on('clickStage', () => {
    selectedNodeId = null;
    closeDetail();
    sigmaInstance.refresh();
  });
  closeDetail();
  selectedNodeId = null;
}

async function reloadGraph() {
  rawData = null;
  await initGraph();
}

function resetLayout() {
  if (!graphInstance) return;
  graphInstance.nodes().forEach(n => {
    graphInstance.setNodeAttribute(n, 'x', Math.random() * 100);
    graphInstance.setNodeAttribute(n, 'y', Math.random() * 100);
  });
  applyLayout(graphInstance);
  sigmaInstance.refresh();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

async function toggleStats() {
  const panel = document.getElementById('stats-panel');
  if (panel.classList.contains('visible')) {
    panel.classList.remove('visible');
    return;
  }
  const res = await fetch('/api/stats');
  const d = await res.json();
  renderStats(d);
  panel.classList.add('visible');
}

function renderStats(d) {
  const el = document.getElementById('stats-content');
  const zeroClass = d.zero_result_searches > 0 ? ' stat-zero' : '';
  let html = `
    <div class="stat-row"><span>Memórias salvas</span><span>${d.total_memories}</span></div>
    <div class="stat-row"><span>Buscas totais</span><span>${d.total_searches}</span></div>
    <div class="stat-row"><span>Buscas sem resultado</span><span class="${zeroClass}">${d.zero_result_searches}</span></div>
  `;

  if (d.by_source && d.by_source.length) {
    html += `<div class="stat-section-title">Por origem</div>`;
    d.by_source.forEach(r => {
      html += `<div class="stat-row"><span>${r.source || '(sem source)'}</span><span>${r.count}</span></div>`;
    });
  }

  if (d.top_queries && d.top_queries.length) {
    html += `<div class="stat-section-title">Queries frequentes</div>`;
    d.top_queries.forEach(r => {
      html += `<div class="stat-row"><span>${escapeHtml(r.query)}</span><span>${r.count}x</span></div>`;
    });
  }

  if (d.recent && d.recent.length) {
    html += `<div class="stat-section-title">Últimas buscas</div>`;
    d.recent.forEach(r => {
      const src = r.source ? ` · ${r.source}` : '';
      const dt = r.searched_at ? r.searched_at.slice(0, 16) : '';
      html += `<div class="search-item">
        <div class="query">${escapeHtml(r.query)}</div>
        <div class="meta">${dt}${src} · ${r.results_count} resultado(s)</div>
      </div>`;
    });
  }

  el.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

initGraph();
</script>
</body>
</html>
